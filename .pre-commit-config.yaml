repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.0
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: npx eslint . --fix
        language: system
        types: [javascript]

      - id: prettier
        name: prettier
        entry: npx prettier --write .
        language: system
        types: [javascript, jsx, json, markdown, yaml]

      - id: type-check
        name: type-check
        entry: npm run typecheck
        language: system
        pass_filenames: false
        types: [javascript, jsx, ts, tsx]
- repo: local
  hooks:
    - id: typescript-typecheck
      name: typescript-typecheck
      entry: npm run typecheck
      language: system
      pass_filenames: false
      stages: [pre-commit]