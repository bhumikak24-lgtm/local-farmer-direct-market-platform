default:
  tags:
    - windows

stages:
  - format
  - build
  - test
  - security

frontend_format:
  stage: format
  script:
    - cd frontend
    - npx prettier --check src

frontend_build:
  stage: build
  script:
    - cd frontend
    - npm install
    - npm run build

backend_test:
  stage: test
  script:
    - cd backend
    - python -m pip install -r requirements.txt
    - python manage.py test

security_audit:
  stage: security
  script:
    - cd frontend
    - npm audit --audit-level=high || true
