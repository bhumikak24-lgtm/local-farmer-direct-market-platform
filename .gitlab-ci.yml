stages:
  - lint
  - format
  - test
  - type_check
  - coverage
  - audit

variables:
  NODE_VERSION: "20"

default:
  image: node:$NODE_VERSION
  before_script:
    - npm install --silent

lint:
  stage: lint
  script:
    - npx eslint .

format:
  stage: format
  script:
    - npx prettier --check .

test:
  stage: test
  script:
    - npm run test

type_check:
  stage: type_check
  script:
    - npx tsc --noEmit

coverage:
  stage: coverage
  script:
    - npm run coverage
  artifacts:
    paths:
      - coverage/

dependency_audit:
  stage: audit
  script:
    - npm audit --audit-level=high

security_scan:
  stage: lint
  script:
    - npx gitleaks detect --source . --verbose
  allow_failure: true