stages:
  - lint
  - format
  - test
  - type_check
  - coverage

variables:
  NODE_VERSION: "20"

default:
  image: node:$NODE_VERSION
  before_script:
    - npm install --silent

lint:
  stage: lint
  script:
    - npm run lint

format:
  stage: format
  script:
    - npm run format
  allow_failure: true

test:
  stage: test
  script:
    - npm run test

type_check:
  stage: type_check
  script:
    - npm run typecheck
  allow_failure: true

coverage:
  stage: coverage
  script:
    - npm run coverage
  artifacts:
    paths:
      - coverage/
    reports:
      coverage_report:
        coverage_format: lcov
        path: coverage/lcov.info

security_scan:
  stage: lint
  script:
    - npm run security
  allow_failure: true

dependency_audit:
  stage: lint
  script:
    - npm run audit